arm:
  kinematics_solver: pick_ik/PickIkPlugin
  kinematics_solver_timeout: 0.10
  kinematics_solver_attempts: 5
  mode: global
  stop_optimization_on_valid_solution: true
  position_scale: 1.0
  rotation_scale: 0.0
  position_threshold: 0.01
  orientation_threshold: 3.14
  cost_threshold: 0.01
  minimal_displacement_weight: 0.001
  gd_step_size: 0.0001
